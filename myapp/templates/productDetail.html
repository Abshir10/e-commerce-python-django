<!DOCTYPE html>
<html lang="en">
<head>
    <meta charset="UTF-8">
    <title>Title</title>
</head>
<body>
{% extends 'base.html' %}
 {% block content %}
  <div class="container py-5">
    <!-- Product Name -->
    <div class="text-center mb-4">
      <h1 class="display-4">{{ product.name }}</h1>
    </div>

    <!-- Product Images -->
    <div class="row text-center">
      <div class="col-md-6 mb-4">
        <img src="{{ product.image_url.0 }}" alt="Product Image 1" class="img-fluid rounded shadow-sm">
      </div>
      <div class="col-md-6 mb-4">
        <img src="{{ product.image_url.1 }}" alt="Product Image 2" class="img-fluid rounded shadow-sm">
      </div>
    </div>

    <!-- Product Description -->
    <div class="text-center mb-4">
      <p class="lead">{{ product.description }}</p>
    </div>

    <!-- Product Price -->
    <div class="text-center">
      <h3 class="text-success">Price: ${{ product.price }}</h3>
    </div>
  </div>

 {% endblock %}
</body>
</html>
