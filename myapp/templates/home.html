<!DOCTYPE html>
<html lang="en">
<head>
    <meta charset="UTF-8">
    <title>Title</title>
</head>
<body>
{% extends 'base.html' %}
 {% block content %}
<H1>Products </H1>
<div class="row">
    {% for product in products %}
    <div class="col">
        <div class="card" style="width: 18rem;">
      <img src="{{ product.image_url.1 }}" class="card-img-top" alt="...">
      <div class="card-body">
        <h5 class="card-title">{{product.name}}</h5>
        <p class="card-text">{{product.price}}</p>
<!--        <a href="#" class="btn btn-primary">Go somewhere</a>-->
    <a href="{% url 'productDetail' id=product.product_id %}" class="btn btn-primary">Go to Product</a>


      </div>
      </div>
    </div>
      {% endfor %}
</div>




 {% endblock %}
</body>
</html>
